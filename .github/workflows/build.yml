name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Generate FormAssist icons
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pip install --quiet Pillow
          python scripts/generate_icon.py

      - name: Download WebView2 Standalone Installer (offline, ~160 Mo)
        shell: pwsh
        run: |
          $ok = $false

          # --- Tentative 1 : URL fwlink stable Microsoft (méthode la plus fiable) ---
          try {
            Write-Host "Tentative 1 : URL fwlink Microsoft"
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124701" `
              -OutFile "WebView2Installer.exe" -MaximumRedirection 10
            if ((Get-Item "WebView2Installer.exe").Length -gt 1MB) {
              $ok = $true
              Write-Host "✅ fwlink a réussi"
            }
          } catch {
            Write-Host "⚠️ fwlink échec : $_"
          }

          # --- Tentative 2 : winget ---
          if (-not $ok) {
            try {
              Write-Host "Tentative 2 : winget download"
              winget download --id Microsoft.EdgeWebView2Runtime `
                --accept-source-agreements --accept-package-agreements `
                --disable-interactivity -d "." 2>&1 | Out-Host
              $found = Get-ChildItem -Filter "*WebView2*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                Move-Item $found.FullName "WebView2Installer.exe" -Force
                $ok = $true
                Write-Host "✅ winget a réussi"
              }
            } catch {
              Write-Host "⚠️ winget échec : $_"
            }
          }

          # --- Tentative 3 : URL de livraison SF (CDN Microsoft) ---
          if (-not $ok) {
            try {
              Write-Host "Tentative 3 : CDN Microsoft sf.dl.delivery"
              $page = Invoke-WebRequest -Uri "https://developer.microsoft.com/en-us/microsoft-edge/webview2/" -UseBasicParsing
              $match = [regex]::Match($page.Content, 'https://[^"'']*MicrosoftEdgeWebView2RuntimeInstallerX64\.exe')
              if ($match.Success) {
                Invoke-WebRequest -Uri $match.Value -OutFile "WebView2Installer.exe"
                $ok = $true
                Write-Host "✅ CDN a réussi"
              }
            } catch {
              Write-Host "⚠️ CDN échec : $_"
            }
          }

          if (-not $ok) { throw "Impossible de télécharger WebView2 Standalone Installer" }

          $mb = [math]::Round((Get-Item "WebView2Installer.exe").Length / 1MB, 1)
          Write-Host "✅ Téléchargé : $mb Mo"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature Ed25519 des installateurs pour la mise à jour automatique
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "FormAssist v__VERSION__"
          releaseBody: |
            Installation Windows de FormAssist.

            Télécharge le fichier `.msi` ou `.exe` ci-dessous et lance l'installation.

            À partir de cette version, les mises à jour se font automatiquement via
            le bouton "Vérifier les mises à jour" dans l'application (Paramètres → À propos).
          releaseDraft: false
          prerelease: false
          # Génère aussi le latest.json + les fichiers de signature .sig pour l'updater
          includeUpdaterJson: true

      # Aussi uploader en artifact (accessible sans Release)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MACOSX_DEPLOYMENT_TARGET: "10.13"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Ajouter la cible Intel pour Universal Binary
        run: rustup target add x86_64-apple-darwin

      - name: Generate FormAssist icons
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python3 -m pip install --quiet --break-system-packages Pillow
          python3 scripts/generate_icon.py

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target universal-apple-darwin
          tagName: v__VERSION__
          releaseName: "FormAssist v__VERSION__"
          releaseBody: |
            Installation Windows et macOS de FormAssist.

            Télécharge le fichier `.msi` ou `.exe` (Windows) ou `.dmg` (macOS) ci-dessous et lance l'installation.

            **Note macOS :** à la première ouverture, fais clic-droit → Ouvrir si macOS bloque l'application.

            À partir de cette version, les mises à jour se font automatiquement via
            le bouton "Vérifier les mises à jour" dans l'application (Paramètres → À propos).
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
