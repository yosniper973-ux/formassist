name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Generate FormAssist icons
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pip install --quiet Pillow
          python scripts/generate_icon.py

      - name: Download WebView2 Standalone Installer (offline, ~160 Mo)
        shell: pwsh
        run: |
          # Stratégie : essayer plusieurs sources pour récupérer le standalone installer.
          # 1. winget download (runner windows-latest)
          # 2. Fallback : choco install qui télécharge l'installateur dans son cache
          # 3. Fallback : URL directe connue

          $ok = $false

          # --- Tentative 1 : winget ---
          try {
            Write-Host "Tentative 1 : winget download"
            winget download --id Microsoft.EdgeWebView2Runtime `
              --accept-source-agreements --accept-package-agreements `
              --disable-interactivity -d "." 2>&1 | Out-Host

            $found = Get-ChildItem -Filter "*WebView2*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              Move-Item $found.FullName "WebView2Installer.exe" -Force
              $ok = $true
              Write-Host "✅ winget a réussi"
            }
          } catch {
            Write-Host "⚠️ winget échec : $_"
          }

          # --- Tentative 2 : chocolatey ---
          if (-not $ok) {
            try {
              Write-Host "Tentative 2 : chocolatey install (télécharge dans cache)"
              choco install microsoft-edge-webview2-runtime -y --no-progress --ignore-checksums 2>&1 | Out-Host
              # Chocolatey télécharge l'installateur dans son cache avant de l'exécuter
              $cached = Get-ChildItem -Path "$env:TEMP" -Recurse -Filter "*WebView2*Installer*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $cached) {
                $cached = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\microsoft-edge-webview2-runtime" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              }
              if ($cached) {
                Copy-Item $cached.FullName "WebView2Installer.exe" -Force
                $ok = $true
                Write-Host "✅ chocolatey a réussi"
              }
            } catch {
              Write-Host "⚠️ chocolatey échec : $_"
            }
          }

          # --- Tentative 3 : scraping page Microsoft ---
          if (-not $ok) {
            try {
              Write-Host "Tentative 3 : scraping page Microsoft"
              $page = Invoke-WebRequest -Uri "https://developer.microsoft.com/en-us/microsoft-edge/webview2/" -UseBasicParsing
              $match = [regex]::Match($page.Content, 'https://[^"'']*MicrosoftEdgeWebView2RuntimeInstallerX64\.exe')
              if ($match.Success) {
                Write-Host "URL trouvée : $($match.Value)"
                Invoke-WebRequest -Uri $match.Value -OutFile "WebView2Installer.exe"
                $ok = $true
              }
            } catch {
              Write-Host "⚠️ scraping échec : $_"
            }
          }

          if (-not $ok) { throw "Impossible de télécharger WebView2 Standalone Installer" }

          $mb = [math]::Round((Get-Item "WebView2Installer.exe").Length / 1MB, 1)
          Write-Host "✅ Téléchargé : $mb Mo"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "FormAssist v__VERSION__"
          releaseBody: |
            Installation Windows de FormAssist.

            Télécharge le fichier `.msi` ou `.exe` ci-dessous et lance l'installation.
          releaseDraft: false
          prerelease: false

      # Aussi uploader en artifact (accessible sans Release)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
