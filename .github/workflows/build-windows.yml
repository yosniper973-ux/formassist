name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Download WebView2 Standalone Installer (offline, ~160 Mo)
        shell: pwsh
        run: |
          # Récupère l'URL du dernier installateur standalone WebView2 x64 via l'API Microsoft
          $response = Invoke-WebRequest -Uri "https://edgeupdates.microsoft.com/api/products?view=enterprise" -UseBasicParsing
          $products = $response.Content | ConvertFrom-Json
          $stable   = $products | Where-Object { $_.Product -eq "Stable" } | Select-Object -First 1
          $release  = $stable.Releases | Where-Object { $_.Platform -eq "Windows" -and $_.Architecture -eq "x64" } | Select-Object -First 1
          $artifact = $release.Artifacts | Where-Object { $_.ArtifactName -like "*WebView2*" } | Select-Object -First 1
          Write-Host "URL : $($artifact.Location)"
          Invoke-WebRequest -Uri $artifact.Location -OutFile "WebView2Installer.exe"
          $mb = [math]::Round((Get-Item "WebView2Installer.exe").Length / 1MB, 1)
          Write-Host "Téléchargé : $mb Mo"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "FormAssist v__VERSION__"
          releaseBody: |
            Installation Windows de FormAssist.

            Télécharge le fichier `.msi` ou `.exe` ci-dessous et lance l'installation.
          releaseDraft: false
          prerelease: false

      # Aussi uploader en artifact (accessible sans Release)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: formassist-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
